<!doctype html>
<html lang="en">
	<head>
		<meta charset="UTF-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0" />
		<title>Localhost Apps</title>
		<link rel="stylesheet" href="popup.css" />
	</head>
	<body>
		<div class="header">
			<h1>Localhost Apps</h1>
			<button id="refresh-btn" title="Refresh">
				<span class="icon">
					<svg
						xmlns="http://www.w3.org/2000/svg"
						width="14"
						height="14"
						viewBox="0 0 24 24"
						fill="none"
						stroke="currentColor"
						stroke-width="2"
						stroke-linecap="round"
						stroke-linejoin="round"
						class="lucide lucide-refresh-ccw-icon lucide-refresh-ccw"
					>
						<path d="M21 12a9 9 0 0 0-9-9 9.75 9.75 0 0 0-6.74 2.74L3 8" />
						<path d="M3 3v5h5" />
						<path d="M3 12a9 9 0 0 0 9 9 9.75 9.75 0 0 0 6.74-2.74L21 16" />
						<path d="M16 16h5v5" /></svg
				></span>
			</button>
		</div>

		<div class="search-bar hidden" id="search-bar">
			<input
				type="text"
				id="search-input"
				placeholder="Filter apps…"
				autocomplete="off"
			/>
		</div>

		<div id="status" class="status">Scanning ports…</div>
		<ul id="app-list" class="app-list"></ul>
		<div id="empty" class="empty hidden">No running apps found.</div>

		<div class="footer">
			<span id="modifier-hint" class="footer-hint"></span>
			<button id="settings-btn" class="link-btn">Settings</button>
		</div>

		<div id="settings-panel" class="settings-panel hidden">
			<h2>Port Ranges</h2>
			<p class="hint">
				Comma-separated ports or ranges (e.g. 3000-3010, 5173-5183)
			</p>
			<textarea id="port-input" rows="3"></textarea>
			<div class="settings-actions">
				<button id="save-settings">Save</button>
				<button id="cancel-settings" class="link-btn">Cancel</button>
			</div>
		</div>

		<script type="module" src="popup.js"></script>
	</body>
</html>
